<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的訂單 — 翔躍下單系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --green:       #06C755;
  --green-dark:  #04A347;
  --green-dim:   rgba(6,199,85,.10);
  --text:        #0D1117;
  --text-2:      #4B5563;
  --text-3:      #9CA3AF;
  --border:      #E5E7EB;
  --border-soft: #F3F4F6;
  --bg:          #F4F6F8;
  --card:        #FFFFFF;
  --red:         #EF4444;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  font-family:'Noto Sans TC', sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

/* ── Nav ─────────────────────────────────────────────────────── */
.nav {
  background:var(--card);
  border-bottom:1px solid var(--border);
  height:58px;
  display:flex; align-items:center;
  padding:0 32px;
  position:sticky; top:0; z-index:100;
}
.nav-brand {
  display:flex; align-items:center; gap:10px;
  text-decoration:none; margin-right:36px; flex-shrink:0;
}
.nav-brand-dot {
  width:8px; height:8px; border-radius:50%;
  background:var(--green);
  box-shadow:0 0 0 3px rgba(6,199,85,.2);
}
.nav-brand-text { font-size:15px; font-weight:800; color:var(--text); letter-spacing:.2px; }
.nav-brand-sub  { font-size:12px; color:var(--text-3); font-weight:400; letter-spacing:.3px; }
.nav-brand-sep  { width:1px; height:16px; background:var(--border); }
.nav-links { display:flex; align-items:center; gap:2px; flex:1; }
.nav-link {
  padding:6px 14px; border-radius:8px;
  font-size:13px; font-weight:500; text-decoration:none;
  color:var(--text-2); transition:all .15s; letter-spacing:.1px;
}
.nav-link:hover { background:var(--border-soft); color:var(--text); }
.nav-link.active { color:var(--green); font-weight:700; background:var(--green-dim); }
.nav-right { display:flex; align-items:center; gap:10px; }
.user-pill {
  display:flex; align-items:center; gap:9px;
  padding:5px 14px 5px 6px; border-radius:100px;
  border:1px solid var(--border); background:var(--card);
}
.user-avatar {
  width:26px; height:26px; border-radius:50%;
  background:var(--green-dim); border:1.5px solid var(--green);
  font-size:11px; font-weight:800; color:var(--green);
  display:flex; align-items:center; justify-content:center;
}
.user-name { font-size:13px; font-weight:600; color:var(--text); }
.btn-logout {
  padding:6px 14px; border-radius:8px;
  border:1px solid var(--border); background:transparent;
  color:var(--text-2); font-size:12px; font-weight:600;
  font-family:inherit; cursor:pointer; transition:all .15s; letter-spacing:.1px;
}
.btn-logout:hover { border-color:#FCA5A5; color:var(--red); background:#FFF5F5; }

/* ── Layout ───────────────────────────────────────────────────── */
.main {
  max-width:760px; margin:0 auto; padding:48px 24px 80px;
  animation:fadeUp .4s cubic-bezier(.22,1,.36,1) both;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}

.page-header { margin-bottom:28px; }
.page-header-eyebrow {
  font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
  color:var(--text-3); margin-bottom:8px;
}
.page-header-title {
  font-size:28px; font-weight:900; letter-spacing:-.6px; color:var(--text); line-height:1.1;
}
.page-header-row {
  display:flex; align-items:flex-end; justify-content:space-between;
  gap:16px; flex-wrap:wrap;
}

/* ── Stats row ───────────────────────────────────────────────── */
.stats-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:24px; }
.stat-chip {
  background:var(--card); border:1px solid var(--border);
  border-radius:8px; padding:8px 16px;
  font-size:12px; font-weight:500; color:var(--text-2);
  display:flex; align-items:center; gap:6px;
}
.stat-chip strong { color:var(--text); font-size:15px; font-weight:800; }

/* ── Filter bar ──────────────────────────────────────────────── */
.filter-bar { display:flex; gap:6px; flex-wrap:wrap; }
.filter-btn {
  padding:5px 14px; border-radius:100px;
  border:1px solid var(--border); background:var(--card);
  font-size:12px; font-weight:600; color:var(--text-2);
  cursor:pointer; transition:all .15s; font-family:inherit; letter-spacing:.1px;
}
.filter-btn:hover { border-color:var(--green); color:var(--green); }
.filter-btn.on { background:var(--green); color:white; border-color:var(--green); box-shadow:0 2px 8px rgba(6,199,85,.28); }

/* ── Order list ──────────────────────────────────────────────── */
.order-list { display:flex; flex-direction:column; gap:10px; margin-top:20px; }

.order-card {
  background:var(--card); border-radius:14px;
  padding:20px 24px;
  border:1px solid var(--border);
  box-shadow:0 1px 3px rgba(0,0,0,.04);
  display:grid; grid-template-columns:1fr auto; gap:16px; align-items:start;
  transition:border-color .15s, box-shadow .15s;
}
.order-card:hover {
  border-color:rgba(6,199,85,.30);
  box-shadow:0 4px 16px rgba(6,199,85,.08);
}

.order-id {
  font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
  color:var(--text-3); margin-bottom:6px;
}
.order-store { font-size:16px; font-weight:800; color:var(--text); margin-bottom:4px; }
.order-content {
  font-size:13.5px; color:var(--text-2); line-height:1.7;
  white-space:pre-wrap; margin-bottom:10px;
}
.order-meta { display:flex; gap:14px; flex-wrap:wrap; }
.meta-item {
  font-size:11.5px; color:var(--text-3);
  display:flex; align-items:center; gap:4px;
}
.meta-item svg { width:12px; height:12px; flex-shrink:0; }
.order-note {
  margin-top:10px;
  background:var(--border-soft); border-radius:8px; padding:8px 12px;
  font-size:12px; color:var(--text-2); border-left:2px solid var(--border);
}

/* ── Status badges ───────────────────────────────────────────── */
.badge {
  display:inline-flex; align-items:center;
  padding:4px 10px; border-radius:100px;
  font-size:11px; font-weight:700; white-space:nowrap; letter-spacing:.3px;
}
.badge-pending    { background:#FEF9C3; color:#A16207; }
.badge-processing { background:#DBEAFE; color:#1D4ED8; }
.badge-completed  { background:var(--green-dim); color:var(--green-dark); }
.badge-cancelled  { background:#FEE2E2; color:#B91C1C; }

/* ── Empty state ─────────────────────────────────────────────── */
.empty {
  text-align:center; padding:72px 20px;
  color:var(--text-3);
}
.empty-icon {
  width:56px; height:56px; border-radius:16px;
  background:var(--border-soft); margin:0 auto 18px;
  display:flex; align-items:center; justify-content:center;
}
.empty-icon svg { width:26px; height:26px; color:var(--text-3); }
.empty h3 { font-size:16px; font-weight:700; color:var(--text-2); margin-bottom:6px; }
.empty p  { font-size:13px; line-height:1.7; }
.empty a  { color:var(--green); font-weight:700; text-decoration:none; }
.empty a:hover { text-decoration:underline; }

/* ── Responsive ──────────────────────────────────────────────── */
@media (max-width:640px) {
  .nav { padding:0 16px; }
  .nav-brand-sub, .nav-brand-sep { display:none; }
  .nav-link { padding:6px 10px; font-size:12px; }
  .main { padding:32px 16px 64px; }
  .user-name { display:none; }
  .page-header-row { flex-direction:column; align-items:flex-start; }
}
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-brand" href="下單.html">
    <div class="nav-brand-dot"></div>
    <span class="nav-brand-text">翔躍</span>
    <div class="nav-brand-sep"></div>
    <span class="nav-brand-sub">下單系統</span>
  </a>
  <div class="nav-links">
    <a href="下單.html"     class="nav-link">訂叫貨</a>
    <a href="我的訂單.html" class="nav-link active">我的訂單</a>
    <a href="我的店面.html"  class="nav-link">我的店面</a>
  </div>
  <div class="nav-right">
    <div class="user-pill">
      <div class="user-avatar"><span id="userAvatar"></span></div>
      <span class="user-name" id="userName"></span>
    </div>
    <button class="btn-logout" onclick="logout()">登出</button>
  </div>
</nav>

<main class="main">

  <div class="page-header">
    <div class="page-header-eyebrow">翔躍企業社</div>
    <div class="page-header-row">
      <div class="page-header-title">我的訂單</div>
      <div class="filter-bar" id="filterBar">
        <button class="filter-btn on" data-status="all"        onclick="setFilter('all')">全部</button>
        <button class="filter-btn"    data-status="pending"    onclick="setFilter('pending')">待處理</button>
        <button class="filter-btn"    data-status="processing" onclick="setFilter('processing')">處理中</button>
        <button class="filter-btn"    data-status="completed"  onclick="setFilter('completed')">已完成</button>
        <button class="filter-btn"    data-status="cancelled"  onclick="setFilter('cancelled')">已取消</button>
      </div>
    </div>
  </div>

  <div class="stats-row" id="statsRow"></div>
  <div class="order-list" id="orderList"></div>

</main>

<script>
const user = JSON.parse(localStorage.getItem('currentUser') || 'null');
if (!user || localStorage.getItem('isLoggedIn') !== 'true') window.location.href = 'index.html';

document.getElementById('userAvatar').textContent = user.avatar;
document.getElementById('userName').textContent   = user.name;

const STATUS_MAP = {
  pending:    { label:'待處理', cls:'badge-pending' },
  processing: { label:'處理中', cls:'badge-processing' },
  completed:  { label:'已完成', cls:'badge-completed' },
  cancelled:  { label:'已取消', cls:'badge-cancelled' },
};

let currentFilter = 'all';

function renderStats(orders) {
  const counts = { all:orders.length };
  Object.keys(STATUS_MAP).forEach(s => counts[s] = orders.filter(o => o.status === s).length);
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-chip"><strong>${counts.all}</strong> 筆訂單</div>
    <div class="stat-chip"><strong>${counts.pending}</strong> 待處理</div>
    <div class="stat-chip"><strong>${counts.processing}</strong> 處理中</div>
    <div class="stat-chip"><strong>${counts.completed}</strong> 已完成</div>
  `;
}

function renderOrders() {
  const allOrders = JSON.parse(localStorage.getItem('orders') || '[]');
  const myOrders  = allOrders.filter(o => o.userId === user.id)
                              .sort((a,b) => b.createdAt.localeCompare(a.createdAt));

  renderStats(myOrders);

  const filtered = currentFilter === 'all' ? myOrders : myOrders.filter(o => o.status === currentFilter);
  const list = document.getElementById('orderList');

  if (filtered.length === 0) {
    list.innerHTML = `
      <div class="empty">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
            <rect x="9" y="3" width="6" height="4" rx="1"/>
            <line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/>
          </svg>
        </div>
        <h3>${currentFilter === 'all' ? '還沒有訂單' : '此分類沒有訂單'}</h3>
        <p>前往 <a href="下單.html">訂貨叫貨</a> 建立第一筆訂單</p>
      </div>`;
    return;
  }

  list.innerHTML = filtered.map(o => {
    const s = STATUS_MAP[o.status] || STATUS_MAP.pending;
    const noteHtml = o.note ? `<div class="order-note">備註：${o.note}</div>` : '';
    return `
      <div class="order-card">
        <div>
          <div class="order-id"># ${o.id}</div>
          <div class="order-store">${o.storeName}</div>
          <div class="order-content">${o.content}</div>
          <div class="order-meta">
            <span class="meta-item">
              <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M7 1C4.24 1 2 3.24 2 6c0 3.5 5 8 5 8s5-4.5 5-8c0-2.76-2.24-5-5-5z"/><circle cx="7" cy="6" r="1.5"/></svg>
              ${o.district}
            </span>
            <span class="meta-item">
              <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="1" y="2" width="12" height="11" rx="1.5"/><line x1="1" y1="6" x2="13" y2="6"/><line x1="4" y1="1" x2="4" y2="3"/><line x1="10" y1="1" x2="10" y2="3"/></svg>
              ${o.createdAt}
            </span>
          </div>
          ${noteHtml}
        </div>
        <div>
          <span class="badge ${s.cls}">${s.label}</span>
        </div>
      </div>`;
  }).join('');
}

function setFilter(status) {
  currentFilter = status;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('on', b.dataset.status === status);
  });
  renderOrders();
}

function logout() {
  if (!confirm('確定要登出嗎？')) return;
  localStorage.removeItem('isLoggedIn');
  localStorage.removeItem('currentUser');
  window.location.href = 'index.html';
}

renderOrders();
</script>
</body>
</html>
