<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登入 — 翔躍下單系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --green:      #06C755;
  --green-dark: #04A347;
  --green-dim:  rgba(6,199,85,.10);
  --text:       #0D1117;
  --text-2:     #4B5563;
  --text-3:     #9CA3AF;
  --border:     #E5E7EB;
  --bg:         #F4F6F8;
  --card:       #FFFFFF;
  --red:        #EF4444;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family:'Noto Sans TC', sans-serif;
  background:var(--bg);
  min-height:100vh;
  display:flex; align-items:center; justify-content:center;
  position:relative; overflow:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ── Background grid texture ─────────────────────────────────── */
body::before {
  content:'';
  position:fixed; inset:0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size:40px 40px;
  opacity:.4;
  pointer-events:none;
}

/* ── Accent glow ─────────────────────────────────────────────── */
.glow {
  position:fixed; border-radius:50%; pointer-events:none;
  filter:blur(80px);
}
.glow-1 {
  width:500px; height:500px;
  top:-160px; right:-160px;
  background:radial-gradient(circle, rgba(6,199,85,.12) 0%, transparent 60%);
}
.glow-2 {
  width:400px; height:400px;
  bottom:-140px; left:-140px;
  background:radial-gradient(circle, rgba(6,199,85,.08) 0%, transparent 60%);
}

/* ── Card ────────────────────────────────────────────────────── */
.card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  padding:48px 44px;
  width:420px; max-width:calc(100vw - 40px);
  text-align:center;
  box-shadow:0 1px 3px rgba(0,0,0,.04), 0 24px 60px rgba(0,0,0,.08);
  position:relative; z-index:1;
  animation:fadeUp .5s cubic-bezier(.22,1,.36,1) both;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── Logo ────────────────────────────────────────────────────── */
.logo-wrap { margin:0 auto 28px; }
.logo-mark {
  width:64px; height:64px; border-radius:18px;
  background:var(--green); margin:0 auto 0;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 6px 24px rgba(6,199,85,.32);
  position:relative; overflow:hidden;
}
.logo-mark::after {
  content:'';
  position:absolute; inset:0;
  background:linear-gradient(135deg, rgba(255,255,255,.2) 0%, transparent 60%);
}
.logo-mark svg { width:34px; height:34px; position:relative; z-index:1; }

/* ── Text ────────────────────────────────────────────────────── */
.eyebrow {
  font-size:10px; font-weight:700; letter-spacing:3px; text-transform:uppercase;
  color:var(--text-3); margin:20px 0 8px;
}
h1 {
  font-size:26px; font-weight:900; color:var(--text);
  letter-spacing:-.5px; margin-bottom:8px;
}
.sub {
  color:var(--text-3); font-size:13px; line-height:1.75; margin-bottom:36px;
}

/* ── LINE button ─────────────────────────────────────────────── */
.line-btn {
  display:flex; align-items:center; justify-content:center; gap:10px;
  width:100%; background:var(--green); color:white;
  border:none; border-radius:12px;
  padding:16px 24px;
  font-size:15px; font-weight:700; font-family:inherit;
  cursor:pointer; letter-spacing:.2px;
  transition:background .18s, box-shadow .18s, transform .18s;
  box-shadow:0 2px 14px rgba(6,199,85,.32);
}
.line-btn:hover {
  background:var(--green-dark);
  box-shadow:0 6px 28px rgba(6,199,85,.44);
  transform:translateY(-1px);
}
.line-btn:active { transform:translateY(0); }

.line-icon {
  width:30px; height:30px; border-radius:8px;
  background:rgba(255,255,255,.2);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.line-icon svg { width:20px; height:20px; }

/* ── Divider ─────────────────────────────────────────────────── */
.sep {
  display:flex; align-items:center; gap:14px;
  margin:24px 0 18px;
  font-size:11px; font-weight:600; color:var(--text-3); letter-spacing:1px; text-transform:uppercase;
}
.sep::before, .sep::after { content:''; flex:1; height:1px; background:var(--border); }

/* ── Notice ──────────────────────────────────────────────────── */
.notice {
  font-size:11.5px; color:var(--text-3); line-height:1.9;
}

/* ── Loading overlay ─────────────────────────────────────────── */
#overlay {
  display:none;
  position:fixed; inset:0;
  background:rgba(255,255,255,.9);
  backdrop-filter:blur(6px);
  z-index:99;
  flex-direction:column; align-items:center; justify-content:center; gap:16px;
}
#overlay.on { display:flex; }
.spinner {
  width:44px; height:44px;
  border:2.5px solid var(--border);
  border-top-color:var(--green);
  border-radius:50%;
  animation:spin .75s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
#overlay p { font-size:13px; color:var(--text-2); font-weight:500; }
</style>
</head>
<body>

<div class="glow glow-1"></div>
<div class="glow glow-2"></div>

<div id="overlay">
  <div class="spinner"></div>
  <p>LINE 登入驗證中，請稍候…</p>
</div>

<div class="card">

  <div class="logo-wrap">
    <div class="logo-mark">
      <svg viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="7" width="22" height="16" rx="4" fill="white" fill-opacity=".9"/>
        <circle cx="10" cy="15" r="2.2" fill="#06C755"/>
        <circle cx="17" cy="15" r="2.2" fill="#06C755"/>
        <circle cx="24" cy="15" r="2.2" fill="#06C755"/>
        <path d="M13 23 L17 29 L21 23" fill="white" fill-opacity=".9"/>
      </svg>
    </div>
  </div>

  <div class="eyebrow">翔躍企業社</div>
  <h1>下單系統</h1>
  <p class="sub">使用 LINE 帳號登入<br>快速、安全的批發下單平台</p>

  <button class="line-btn" onclick="handleLineLogin()">
    <div class="line-icon">
      <svg viewBox="0 0 24 24" fill="white">
        <path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63h2.386c.349 0 .63.285.63.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63.349 0 .631.285.631.63v4.771zm-2.466.629H4.917c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.281.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/>
      </svg>
    </div>
    使用 LINE 帳號登入
  </button>

  <div class="sep">安全保障</div>
  <p class="notice">
    本系統採用 LINE 官方 OAuth 2.0 認證<br>
    您的個人資料受到完整保護
  </p>

</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
const LIFF_ID = localStorage.getItem('xy_liffId') || '2009824470-aKS2WXeU';

async function initLiff() {
  if (!LIFF_ID) {
    showError('尚未設定 LIFF ID，請聯絡管理員。');
    return;
  }

  if (localStorage.getItem('isLoggedIn') === 'true') {
    window.location.href = '下單.html';
    return;
  }

  try {
    await liff.init({ liffId: LIFF_ID });

    if (liff.isLoggedIn()) {
      document.getElementById('overlay').classList.add('on');
      const profile = await liff.getProfile();
      const user = {
        id:     profile.userId,
        name:   profile.displayName,
        avatar: profile.displayName.charAt(0),
        lineId: profile.userId,
      };
      localStorage.setItem('currentUser', JSON.stringify(user));
      localStorage.setItem('isLoggedIn', 'true');
      window.location.href = '下單.html';
    }
  } catch(e) {
    showError('LIFF 初始化失敗：' + e.message);
  }
}

function handleLineLogin() {
  if (!LIFF_ID) { showError('尚未設定 LIFF ID，請聯絡管理員。'); return; }
  document.getElementById('overlay').classList.add('on');
  liff.login();
}

function showError(msg) {
  const el = document.createElement('p');
  el.style.cssText = 'color:#EF4444;font-size:12px;margin-top:16px;font-weight:600;';
  el.textContent = msg;
  document.querySelector('.card').appendChild(el);
}

initLiff();
</script>
</body>
</html>
